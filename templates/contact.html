{{define "content"}}
<section class="page-banner">
    <div class="container">
        <h1>联系我们</h1>
        <p>如有任何疑问或需要帮助，请随时与我们联系</p>
    </div>
</section>

<section class="content-section">
    <div class="container">
        <div class="contact-grid">
            <div class="contact-info">
                <h2>联系方式</h2>
                <div class="contact-item">
                    <span class="contact-icon">📞</span>
                    <div>
                        <strong>咨询热线</strong>
                        <p>400-888-9999（24小时）</p>
                    </div>
                </div>
                <div class="contact-item">
                    <span class="contact-icon">📞</span>
                    <div>
                        <strong>预约挂号</strong>
                        <p>400-888-9998（8:00-17:30）</p>
                    </div>
                </div>
                <div class="contact-item">
                    <span class="contact-icon">🚑</span>
                    <div>
                        <strong>急救电话</strong>
                        <p>120 / 021-5888-9999</p>
                    </div>
                </div>
                <div class="contact-item">
                    <span class="contact-icon">📧</span>
                    <div>
                        <strong>电子邮箱</strong>
                        <p>info@renhe-hospital.com</p>
                    </div>
                </div>
                <div class="contact-item">
                    <span class="contact-icon">📍</span>
                    <div>
                        <strong>医院地址</strong>
                        <p>上海市浦东新区仁和路100号</p>
                        <p>邮编：200120</p>
                    </div>
                </div>
                <div class="contact-item">
                    <span class="contact-icon">🚇</span>
                    <div>
                        <strong>交通指南</strong>
                        <p>地铁2号线 仁和路站 3号出口</p>
                        <p>公交：18路、45路、76路、98路</p>
                    </div>
                </div>
            </div>

            <div class="contact-form-wrapper">
                <h2>在线留言</h2>
                <form class="contact-form">
                    <div class="form-group">
                        <label for="name">姓名</label>
                        <input type="text" id="name" placeholder="请输入您的姓名" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">电话</label>
                        <input type="tel" id="phone" placeholder="请输入您的联系电话" required>
                    </div>
                    <div class="form-group">
                        <label for="email">邮箱</label>
                        <input type="email" id="email" placeholder="请输入您的电子邮箱">
                    </div>
                    <div class="form-group">
                        <label for="message">留言内容</label>
                        <textarea id="message" rows="5" placeholder="请输入您想咨询的内容" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">提交留言</button>
                </form>
            </div>
        </div>
    </div>
</section>
{{end}}
